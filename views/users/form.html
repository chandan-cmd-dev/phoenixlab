{{template "layouts/base.html" .}}

{{define "LayoutContent"}}
<div class="row">
<div class="col-lg-6 mx-auto">
    <div class="card card-primary card-outline">
        <div class="card-header">
            <h3 class="card-title">{{if .user}}Edit User{{else}}Create User{{end}}</h3>
        </div>
        <form method="POST" action="{{if .user}}/users/{{.user.Id}}/update{{else}}/users{{end}}">
            <div class="card-body">
                <div class="form-group">
                    <label>Full Name <span class="text-danger">*</span></label>
                    <input type="text" name="name" value="{{if .user}}{{.user.Name}}{{end}}" required class="form-control">
                </div>
                <div class="form-group">
                    <label>Email Address <span class="text-danger">*</span></label>
                    <input type="email" name="email" value="{{if .user}}{{.user.Email}}{{end}}" required class="form-control">
                </div>
                {{if not .user}}
                <div class="form-group">
                    <label>Password <span class="text-danger">*</span></label>
                    <input type="password" name="password" required minlength="8" class="form-control" placeholder="Minimum 8 characters">
                </div>
                {{end}}
                <div class="form-group">
                    <label>Role <span class="text-danger">*</span></label>
                    <select name="role" required class="form-control">
                        <option value="">Select role</option>
                        {{if eq $.currentUser.Role "super_admin"}}
                        <option value="super_admin" {{if .user}}{{if eq .user.Role "super_admin"}}selected{{end}}{{end}}>Super Admin</option>
                        {{end}}
                        <option value="admin" {{if .user}}{{if eq .user.Role "admin"}}selected{{end}}{{end}}>Admin</option>
                        <option value="technician" {{if .user}}{{if eq .user.Role "technician"}}selected{{end}}{{end}}>Technician</option>
                        <option value="viewer" {{if .user}}{{if eq .user.Role "viewer"}}selected{{end}}{{end}}>Viewer</option>
                    </select>
                </div>
                {{if .branches}}
                <div class="form-group">
                    <label>Branch</label>
                    <select name="branch_id" class="form-control">
                        <option value="0">No branch (Super Admin)</option>
                        {{range .branches}}
                        <option value="{{.Id}}" {{if $.user}}{{if eq $.user.BranchId .Id}}selected{{end}}{{end}}>{{.Name}}</option>
                        {{end}}
                    </select>
                </div>
                {{end}}
            </div>
            <div class="card-footer">
                <button type="submit" class="btn btn-primary mr-2"><i class="fas fa-save mr-1"></i>{{if .user}}Update User{{else}}Create User{{end}}</button>
                <a href="/users" class="btn btn-default">Cancel</a>
            </div>
        </form>
    </div>
</div>
</div>
{{end}}
