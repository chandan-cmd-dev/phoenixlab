{{template "layouts/base.html" .}}

{{define "LayoutContent"}}
<div class="row">
<div class="col-lg-8 mx-auto">
    <div class="card card-primary card-outline">
        <div class="card-header"><h3 class="card-title"><i class="fas fa-link mr-1"></i>Connect a Spreadsheet</h3></div>
        <form method="POST" action="/sheets/connect">
            <div class="card-body">
                <div class="form-group">
                    <label>Spreadsheet URL or ID <span class="text-danger">*</span></label>
                    <input type="text" name="spreadsheet_id" class="form-control" required
                           placeholder="https://docs.google.com/spreadsheets/d/...">
                    <small class="text-muted">Paste the full Google Sheets URL or just the spreadsheet ID. The connected Google account must have access to it.</small>
                </div>
                {{if .branches}}
                <div class="form-group">
                    <label>Branch <span class="text-danger">*</span></label>
                    <select name="branch_id" class="form-control" required>
                        <option value="">Select a branch...</option>
                        {{range .branches}}<option value="{{.Id}}">{{.Name}}</option>{{end}}
                    </select>
                </div>
                {{end}}
            </div>
            <div class="card-footer">
                <button type="submit" class="btn btn-primary mr-2"><i class="fas fa-plug mr-1"></i>Connect &amp; Map</button>
                <a href="/sheets" class="btn btn-default">Cancel</a>
            </div>
        </form>
    </div>
</div>
</div>
{{end}}
