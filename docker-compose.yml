# ============================================================
#  WARNING: NEVER run "docker compose down -v" in production.
#  The -v flag deletes ALL data volumes including the database.
#  Use "docker compose down" (without -v) or the deploy script.
# ============================================================

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - BEEGO_RUNMODE=prod
      - DATABASE_URL=postgres://tracker:secret@db:5432/phoenixlab?sslmode=disable
      - ODOO_URL=${ODOO_URL:-}
      - ODOO_DB=${ODOO_DB:-}
      - ODOO_USER=${ODOO_USER:-}
      - ODOO_PASSWORD=${ODOO_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tracker
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: phoenixlab
    volumes:
      # Bind-mount to host directory — data persists even if volumes are pruned
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracker -d phoenixlab"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    ports:
      - "5432:5432"
